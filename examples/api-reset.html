<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>resetAll() / resetGlyph() · Adjustable Web Type example</title>
    <link rel="stylesheet" href="example.css" />
  </head>
  <body>
    <main class="wrap">
      <a class="backlink" href="../adjustable-web-type.html"
        >&larr; Adjustable Web Type</a
      >
      <h1><code>resetAll()</code> / <code>resetGlyph(index)</code></h1>
      <p class="lede">
        Reverts each glyph to the active preset (or module defaults when the
        preset is <code>none</code>) and re-renders.
        <code>resetGlyph</code> reverts a single letter by index;
        <code>resetAll</code> reverts the whole wordmark.
      </p>

      <div id="stage" class="stage"></div>
      <div class="controls">
        <button id="resetFirst">resetGlyph(0)</button>
        <button id="resetAll">resetAll()</button>
      </div>
      <p class="hint">Drag a few handles to tune letters, then reset.</p>

      <h2>Code</h2>
      <pre class="code"><code id="code"></code></pre>
    </main>

    <script src="../lib/sculpt.js"></script>
    <script id="example" type="text/plain">
      const wm = await SculptLettering.createWordmark("hello jazz", { preset: "none" });
      wm.mount("#stage");
      wm.makeInteractive();

      document.getElementById("resetFirst").onclick = () => wm.resetGlyph(0);
      document.getElementById("resetAll").onclick = () => wm.resetAll();
    </script>
    <script>
      // Mirror the example source into the panel (dedented so Prettier's
      // indentation of the text/plain block doesn't leak into the display),
      // then run it (async wrapper so top-level await works).
      const raw = document
        .getElementById("example")
        .textContent.replace(/^\n+/, "")
        .replace(/\s+$/, "");
      const lines = raw.split("\n");
      const pad = Math.min(
        ...lines.filter((l) => l.trim()).map((l) => l.match(/^ */)[0].length)
      );
      const src = lines.map((l) => l.slice(pad)).join("\n");
      document.getElementById("code").textContent = src;
      new Function("return (async () => {\n" + src + "\n})()")().catch(
        console.error
      );
    </script>
  </body>
</html>
