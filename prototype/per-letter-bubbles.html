<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PROTOTYPE · per-letter bubbliness/amplitude</title>
    <!--
      THROWAWAY PROTOTYPE — delete or fold the winner into lib/sculpt.js.

      Question it answers: what should per-letter control of the Rubik Bubbles
      axes (bubbliness, amplitude) look and feel like, once they stop being two
      global sliders and become per-glyph?

      How it cheats: each letter is its own single-glyph DeformableOutlineWordmark
      with its own axisValues — so the deformation is REAL, but the "one wordmark,
      many letters" layout is faked by lining up N one-letter wordmarks. The real
      rebuild would instead carry per-glyph axis state inside one wordmark.

      Three radically different interaction models, switch with ?variant=A|B|C
      or the floating bar (← / → keys):
        A — Orbiting twin nodes : two draggable dots beside each letter (vertical drag = value)
        B — Docked mini-sliders : explicit labelled b/a sliders under each letter
        C — Drag-on-the-glyph   : no chrome; press the letter and drag (x = bubbliness, y = amplitude)
    -->
    <style>
      :root {
        --paper: #f6f7f9;
        --ink: #0a0a0b;
        --muted: #525860;
        --rule: #e2e5ea;
        --accent: #2a2ae5;
        --sans: "Instrument Sans", ui-sans-serif, system-ui, sans-serif;
        --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
      }
      body {
        background: var(--paper);
        color: var(--ink);
        font-family: var(--sans);
        min-height: 100vh;
      }
      header {
        padding: 22px 28px 6px;
      }
      header .kicker {
        font-family: var(--mono);
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--accent);
      }
      header h1 {
        margin: 6px 0 4px;
        font-size: 19px;
        font-weight: 600;
      }
      header p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        max-width: 70ch;
      }
      #letters {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-end;
        justify-content: center;
        gap: 28px;
        padding: 60px 28px 40px;
        min-height: 46vh;
      }
      .letter-cell {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px;
      }
      .letter-cell .glyph svg {
        height: 200px;
        width: auto;
        display: block;
      }
      /* Variant A — orbiting nodes */
      .orbit-node {
        position: absolute;
        width: 15px;
        height: 15px;
        border-radius: 50%;
        cursor: ns-resize;
        touch-action: none;
        border: 1.5px solid var(--accent);
        transform: translate(-50%, -50%);
        z-index: 3;
      }
      .orbit-node.bubbliness {
        background: var(--accent);
      }
      .orbit-node.amplitude {
        background: #fff;
      }
      .orbit-node::after {
        content: attr(data-tag);
        position: absolute;
        left: 50%;
        top: -16px;
        transform: translateX(-50%);
        font-family: var(--mono);
        font-size: 9px;
        color: var(--muted);
        opacity: 0;
        transition: opacity 120ms;
      }
      .orbit-node:hover::after {
        opacity: 1;
      }
      /* Variant B — docked mini sliders */
      .slider-panel {
        position: absolute;
        left: 50%;
        bottom: -52px;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        gap: 4px;
        width: 92px;
      }
      .slider-row {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .slider-row span {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--muted);
        width: 10px;
      }
      .slider-row input[type="range"] {
        flex: 1;
        accent-color: var(--accent);
      }
      /* Variant C — drag on the glyph */
      .letter-cell.gesture {
        cursor: move;
        touch-action: none;
        border-radius: 8px;
      }
      .letter-cell.gesture:hover {
        background: rgba(42, 42, 229, 0.05);
      }
      .gesture-hint {
        position: absolute;
        bottom: -18px;
        left: 50%;
        transform: translateX(-50%);
        font-family: var(--mono);
        font-size: 10px;
        color: var(--muted);
      }
      .crosshair {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(var(--accent), var(--accent)) center / 1px 100%
            no-repeat,
          linear-gradient(var(--accent), var(--accent)) center / 100% 1px
            no-repeat;
        opacity: 0.35;
      }
      /* State readout */
      #readout {
        position: fixed;
        top: 0;
        right: 0;
        padding: 10px 14px;
        font-family: var(--mono);
        font-size: 11px;
        line-height: 1.6;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.85);
        border-left: 1px solid var(--rule);
        border-bottom: 1px solid var(--rule);
        border-bottom-left-radius: 6px;
        max-width: 240px;
      }
      #readout b {
        color: var(--ink);
      }
      /* Floating switcher */
      #switcher {
        position: fixed;
        bottom: 18px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 8px 12px;
        background: #0a0a0b;
        color: #fff;
        border-radius: 999px;
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.25);
        font-family: var(--mono);
        font-size: 12px;
        z-index: 50;
        user-select: none;
      }
      #switcher button {
        background: none;
        border: none;
        color: #fff;
        font-size: 16px;
        cursor: pointer;
        padding: 2px 6px;
        border-radius: 6px;
      }
      #switcher button:hover {
        background: rgba(255, 255, 255, 0.15);
      }
      #switcher .label {
        min-width: 190px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="kicker">Prototype · ?variant=A|B|C · ← → to switch</div>
      <h1>Per-letter bubbliness &amp; amplitude — three interaction models</h1>
      <p>
        Each letter is its own Rubik Bubbles wordmark with its own axis values.
        Try making one letter wildly bubbly and its neighbour calm. The readout
        (top-right) shows every letter's live values.
      </p>
    </header>

    <div id="letters"></div>
    <div id="readout"></div>

    <nav id="switcher">
      <button id="prev" aria-label="Previous variant">←</button>
      <span class="label" id="variant-label"></span>
      <button id="next" aria-label="Next variant">→</button>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
    <script src="../lib/sculpt.js"></script>
    <script>
      const WORD = "bubbly";
      const VARIANTS = {
        A: "A — Orbiting twin nodes",
        B: "B — Docked mini-sliders",
        C: "C — Drag-on-the-glyph",
      };
      const clamp = (v) => Math.max(0, Math.min(1, v));
      const letters = []; // { char, wm, cell, glyph, state:{bubbliness,amplitude} }
      let teardown = null;

      const readoutEl = document.getElementById("readout");
      function renderReadout() {
        readoutEl.innerHTML = letters
          .map(
            (L) =>
              `<div><b>${L.char}</b> &nbsp;b ${L.state.bubbliness.toFixed(
                2
              )} &nbsp;a ${L.state.amplitude.toFixed(2)}</div>`
          )
          .join("");
      }
      function onChange(i, axis, value) {
        const L = letters[i];
        L.state[axis] = clamp(value);
        L.wm.setAxis(axis, L.state[axis]);
        renderReadout();
      }

      async function buildLetters() {
        SculptLettering.setOpentypeParser(window.opentype);
        const row = document.getElementById("letters");
        for (const ch of WORD) {
          const cell = document.createElement("div");
          cell.className = "letter-cell";
          const glyph = document.createElement("div");
          glyph.className = "glyph";
          cell.appendChild(glyph);
          row.appendChild(cell);
          const wm = await SculptLettering.createWordmark(ch, {
            preset: "bubbly",
          });
          wm.mount(glyph);
          letters.push({
            char: ch,
            wm,
            cell,
            glyph,
            state: { bubbliness: 0.5, amplitude: 0.5 },
          });
        }
        renderReadout();
      }

      // ── Variant A — orbiting twin nodes ──────────────────────────────────
      function mountA() {
        const nodes = [];
        letters.forEach((L, i) => {
          ["bubbliness", "amplitude"].forEach((axis) => {
            const node = document.createElement("div");
            node.className = "orbit-node " + axis;
            node.dataset.tag = axis === "bubbliness" ? "bubble" : "amp";
            L.cell.appendChild(node);
            const place = () => {
              const h = L.cell.clientHeight;
              node.style.top = 12 + (1 - L.state[axis]) * (h - 24) + "px";
              node.style.left =
                (axis === "bubbliness" ? 4 : L.cell.clientWidth - 4) + "px";
            };
            place();
            node.addEventListener("pointerdown", (e) => {
              e.preventDefault();
              node.setPointerCapture(e.pointerId);
              const h = L.cell.clientHeight - 24;
              const startY = e.clientY;
              const startV = L.state[axis];
              const move = (ev) => {
                onChange(i, axis, startV - (ev.clientY - startY) / h);
                place();
              };
              const up = () => {
                window.removeEventListener("pointermove", move);
                window.removeEventListener("pointerup", up);
              };
              window.addEventListener("pointermove", move);
              window.addEventListener("pointerup", up);
            });
            nodes.push(node);
          });
        });
        return () => nodes.forEach((n) => n.remove());
      }

      // ── Variant B — docked mini sliders ──────────────────────────────────
      function mountB() {
        const panels = [];
        letters.forEach((L, i) => {
          const panel = document.createElement("div");
          panel.className = "slider-panel";
          ["bubbliness", "amplitude"].forEach((axis) => {
            const rowEl = document.createElement("label");
            rowEl.className = "slider-row";
            const tag = document.createElement("span");
            tag.textContent = axis[0];
            const range = document.createElement("input");
            range.type = "range";
            range.min = 0;
            range.max = 1;
            range.step = 0.01;
            range.value = L.state[axis];
            range.addEventListener("input", () =>
              onChange(i, axis, parseFloat(range.value))
            );
            rowEl.appendChild(tag);
            rowEl.appendChild(range);
            panel.appendChild(rowEl);
          });
          L.cell.appendChild(panel);
          panels.push(panel);
        });
        return () => panels.forEach((p) => p.remove());
      }

      // ── Variant C — drag on the glyph (2D gesture) ───────────────────────
      function mountC() {
        const cleanups = [];
        letters.forEach((L, i) => {
          L.cell.classList.add("gesture");
          const hint = document.createElement("div");
          hint.className = "gesture-hint";
          hint.textContent = "drag ↕↔";
          L.cell.appendChild(hint);
          const cross = document.createElement("div");
          cross.className = "crosshair";
          cross.hidden = true;
          L.cell.appendChild(cross);
          const down = (e) => {
            e.preventDefault();
            L.cell.setPointerCapture(e.pointerId);
            cross.hidden = false;
            hint.hidden = true;
            const sx = e.clientX;
            const sy = e.clientY;
            const sB = L.state.bubbliness;
            const sA = L.state.amplitude;
            const SPAN = 130;
            const move = (ev) => {
              onChange(i, "bubbliness", sB + (ev.clientX - sx) / SPAN);
              onChange(i, "amplitude", sA - (ev.clientY - sy) / SPAN);
            };
            const up = () => {
              cross.hidden = true;
              hint.hidden = false;
              window.removeEventListener("pointermove", move);
              window.removeEventListener("pointerup", up);
            };
            window.addEventListener("pointermove", move);
            window.addEventListener("pointerup", up);
          };
          L.cell.addEventListener("pointerdown", down);
          cleanups.push(() => {
            L.cell.classList.remove("gesture");
            hint.remove();
            cross.remove();
            L.cell.removeEventListener("pointerdown", down);
          });
        });
        return () => cleanups.forEach((f) => f());
      }

      const MOUNTERS = { A: mountA, B: mountB, C: mountC };

      function showVariant(key) {
        if (!VARIANTS[key]) key = "A";
        if (teardown) teardown();
        teardown = MOUNTERS[key]();
        document.getElementById("variant-label").textContent = VARIANTS[key];
        const url = new URL(location.href);
        url.searchParams.set("variant", key);
        history.replaceState(null, "", url);
      }
      function currentKey() {
        return new URL(location.href).searchParams.get("variant") || "A";
      }
      function cycle(dir) {
        const keys = Object.keys(VARIANTS);
        const idx = keys.indexOf(currentKey());
        showVariant(keys[(idx + dir + keys.length) % keys.length]);
      }

      document.getElementById("prev").onclick = () => cycle(-1);
      document.getElementById("next").onclick = () => cycle(1);
      window.addEventListener("keydown", (e) => {
        const t = e.target;
        if (t && /^(INPUT|TEXTAREA)$/.test(t.tagName)) return;
        if (e.key === "ArrowLeft") cycle(-1);
        if (e.key === "ArrowRight") cycle(1);
      });

      buildLetters().then(() => showVariant(currentKey()));
    </script>
  </body>
</html>
